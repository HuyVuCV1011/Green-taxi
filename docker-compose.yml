name: green-taxi

services:
  mysql_hr:
    image: mysql:8.4
    container_name: green_taxi_mysql_hr
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_HR_DATABASE:-green_taxi_hr}
      MYSQL_USER: ${MYSQL_HR_USER:-green_taxi_hr_app}
      MYSQL_PASSWORD: ${MYSQL_HR_PASSWORD:-change_me_hr}
      MYSQL_ROOT_PASSWORD: ${MYSQL_HR_ROOT_PASSWORD:-change_me_hr_root}
    ports:
      - "${MYSQL_HR_PORT:-3307}:3306"
    volumes:
      - mysql_hr_data:/var/lib/mysql
    networks:
      - green_taxi_net
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  mongodb_fleet:
    image: mongo:7.0
    container_name: green_taxi_mongodb_fleet
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: ${MONGODB_FLEET_DATABASE:-green_taxi_fleet}
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_FLEET_ROOT_USER:-green_taxi_fleet_admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_FLEET_ROOT_PASSWORD:-change_me_fleet_root}
    ports:
      - "${MONGODB_FLEET_PORT:-27018}:27017"
    volumes:
      - mongodb_fleet_data:/data/db
    networks:
      - green_taxi_net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --host 127.0.0.1 --username \"$${MONGO_INITDB_ROOT_USERNAME}\" --password \"$${MONGO_INITDB_ROOT_PASSWORD}\" --authenticationDatabase admin --eval \"db.adminCommand('ping').ok\" | grep 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  postgres_dispatch:
    image: postgres:16
    container_name: green_taxi_postgres_dispatch
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DISPATCH_DATABASE:-green_taxi_dispatch}
      POSTGRES_USER: ${POSTGRES_DISPATCH_USER:-green_taxi_dispatch_app}
      POSTGRES_PASSWORD: ${POSTGRES_DISPATCH_PASSWORD:-change_me_dispatch}
    ports:
      - "${POSTGRES_DISPATCH_PORT:-5433}:5432"
    volumes:
      - postgres_dispatch_data:/var/lib/postgresql/data
    networks:
      - green_taxi_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  postgres_warehouse:
    image: postgres:16
    container_name: green_taxi_postgres_warehouse
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_WAREHOUSE_DATABASE:-green_taxi_warehouse}
      POSTGRES_USER: ${POSTGRES_WAREHOUSE_USER:-green_taxi_warehouse_app}
      POSTGRES_PASSWORD: ${POSTGRES_WAREHOUSE_PASSWORD:-change_me_warehouse}
    ports:
      - "${POSTGRES_WAREHOUSE_PORT:-5434}:5432"
    volumes:
      - postgres_warehouse_data:/var/lib/postgresql/data
    networks:
      - green_taxi_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

networks:
  green_taxi_net:
    name: green_taxi_net

volumes:
  mysql_hr_data:
    name: green_taxi_mysql_hr_data
  mongodb_fleet_data:
    name: green_taxi_mongodb_fleet_data
  postgres_dispatch_data:
    name: green_taxi_postgres_dispatch_data
  postgres_warehouse_data:
    name: green_taxi_postgres_warehouse_data
